name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Audit UI shell stability
        run: pnpm audit:ui-shell

      - name: Audit admin preview operations data
        run: pnpm audit:admin-preview

      - name: Audit knowledge operations readiness
        run: pnpm audit:knowledge-ops

      - name: Verify regulatory rules
        run: pnpm test:rules

      - name: Check generated seed drift
        run: |
          pnpm build:supabase-seed
          git diff --exit-code data/rules/tw-cosmetics-rules.json data/rules/manifest.json supabase/seed.sql

      - name: Check knowledge seed drift
        run: pnpm check:knowledge-drift

      - name: Validate knowledge base
        run: pnpm validate:knowledge

      - name: Audit knowledge quality
        run: pnpm audit:knowledge

      - name: Dry-run Supabase SQL apply
        run: SUPABASE_APPLY_DRY_RUN=1 pnpm apply:supabase-knowledge

      - name: Dry-run Supabase knowledge verification
        run: SUPABASE_VERIFY_DRY_RUN=1 pnpm verify:supabase-knowledge

      - name: Build
        run: pnpm build

      - name: Start production server
        run: |
          pnpm exec next start -p 3000 > /tmp/labelpass-next.log 2>&1 &
          app_pid=$!
          echo "$app_pid" > /tmp/labelpass-next.pid
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/labelpass-next.log
          exit 1

      - name: Smoke test review API
        run: LABELPASS_BASE_URL=http://127.0.0.1:3000 pnpm smoke:api

      - name: Smoke test admin operations API
        run: LABELPASS_BASE_URL=http://127.0.0.1:3000 pnpm smoke:admin-ops

      - name: Audit browser UI shell
        run: LABELPASS_BASE_URL=http://127.0.0.1:3000 pnpm audit:ui-browser

      - name: Dump production server log on failure
        if: failure()
        run: cat /tmp/labelpass-next.log || true

      - name: Stop production server
        if: always()
        run: |
          if [ -f /tmp/labelpass-next.pid ]; then
            kill "$(cat /tmp/labelpass-next.pid)" || true
          fi
