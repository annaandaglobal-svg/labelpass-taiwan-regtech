name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Verify regulatory rules
        run: pnpm test:rules

      - name: Check generated seed drift
        run: |
          pnpm build:supabase-seed
          git diff --exit-code data/rules/tw-cosmetics-rules.json data/rules/manifest.json supabase/seed.sql

      - name: Check knowledge seed drift
        run: |
          pnpm build:knowledge-seed
          git diff --exit-code data/knowledge/term-index.json supabase/knowledge-seed.sql

      - name: Validate knowledge base
        run: pnpm validate:knowledge

      - name: Audit knowledge quality
        run: pnpm audit:knowledge

      - name: Dry-run Supabase SQL apply
        run: SUPABASE_APPLY_DRY_RUN=1 pnpm apply:supabase-knowledge

      - name: Dry-run Supabase knowledge verification
        run: SUPABASE_VERIFY_DRY_RUN=1 pnpm verify:supabase-knowledge

      - name: Build
        run: pnpm build

      - name: Smoke test production server
        run: |
          pnpm exec next start -p 3000 > /tmp/labelpass-next.log 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" || true' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              LABELPASS_BASE_URL=http://127.0.0.1:3000 pnpm smoke:api
              exit 0
            fi
            sleep 1
          done
          cat /tmp/labelpass-next.log
          exit 1
