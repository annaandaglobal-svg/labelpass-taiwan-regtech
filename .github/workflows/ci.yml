name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Verify regulatory rules
        run: pnpm test:rules

      - name: Check generated seed drift
        run: |
          pnpm build:supabase-seed
          git diff --exit-code data/rules/tw-cosmetics-rules.json data/rules/manifest.json supabase/seed.sql

      - name: Check knowledge seed drift
        run: |
          pnpm build:knowledge-seed
          git diff --exit-code data/knowledge/term-index.json supabase/knowledge-seed.sql

      - name: Build
        run: pnpm build
